<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Coffee Shop - Kitchen</title>
    <link rel="stylesheet" href="/static/coffee.css" />
  </head>
  <body>
    <header>
      <h1>Kitchen Dashboard</h1>
      <nav><a href="/">Customer Page</a></nav>
    </header>

    <main class="container">
      <div class="row">
        <button id="refresh">Refresh</button>
      </div>

      <h2>Orders</h2>
      <div id="orders"></div>

      <h2>Inventory</h2>
      <div id="inventory" class="box"></div>

      <h2>Debug</h2>
      <pre id="debug" class="box"></pre>
    </main>

    <script>
      const ordersEl = document.getElementById("orders");
      const inventoryEl = document.getElementById("inventory");
      const debugEl = document.getElementById("debug");

      async function load() {
        const [ordersRes, inventoryRes] = await Promise.all([
          fetch("/api/orders"),
          fetch("/api/inventory"),
        ]);

        const orders = await ordersRes.json();
        const inventory = await inventoryRes.json();

        renderOrders(orders);
        renderInventory(inventory);
      }

      function renderOrders(orders) {
        ordersEl.innerHTML = "";
        if (orders.length === 0) {
          ordersEl.innerHTML = '<p class="box">No orders yet.</p>';
          return;
        }

        for (const o of orders) {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <div><b>#${o.id}</b> - ${o.customer_name}</div>
            <div>item_id: ${o.item_id} | qty: ${o.qty}</div>
            <div>note: ${o.note || "-"}</div>
            <div>status: <b>${o.status}</b></div>
            <div class="row">
              <button data-status="RECEIVED">RECEIVED</button>
              <button data-status="PREPARING">PREPARING</button>
              <button data-status="READY">READY</button>
              <button data-status="CANCELLED">CANCELLED</button>
            </div>
          `;

          div.querySelectorAll("button[data-status]").forEach((btn) => {
            btn.addEventListener("click", async () => {
              const status = btn.getAttribute("data-status");
              const r = await fetch(`/api/orders/${o.id}/status`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status }),
              });
              debugEl.textContent = await r.text();
              await load();
            });
          });

          ordersEl.appendChild(div);
        }
      }

      function renderInventory(items) {
        inventoryEl.innerHTML = items
          .map((item) => `${item.item_name} (id:${item.item_id}) stock: ${item.stock}`)
          .join("\n");
      }

      document.getElementById("refresh").addEventListener("click", load);
      load();
    </script>
  </body>
</html>
