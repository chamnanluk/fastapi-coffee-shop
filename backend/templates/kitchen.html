<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Coffee Shop - Kitchen</title>
    <link rel="stylesheet" href="/static/coffee.css" />
  </head>
  <body>
    <header>
      <h1>Kitchen</h1>
      <nav><a href="/">Customer</a></nav>
    </header>

    <main class="container">
      <div class="row">
        <button id="refresh">Refresh</button>
      </div>

      <div id="orders"></div>
      <pre id="debug" class="box"></pre>
    </main>

    <script>
      const ordersEl = document.getElementById("orders");
      const debugEl = document.getElementById("debug");

      async function load() {
        const res = await fetch("/api/orders");
        const orders = await res.json();
        render(orders);
      }

      function render(orders) {
        ordersEl.innerHTML = "";
        for (const o of orders) {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <div><b>#${o.id}</b> - ${o.customer_name}</div>
            <div>item_id: ${o.item_id} | qty: ${o.qty}</div>
            <div>status: <b>${o.status}</b></div>
            <div class="row">
              <button data-status="RECEIVED">RECEIVED</button>
              <button data-status="PREPARING">PREPARING</button>
              <button data-status="READY">READY</button>
              <button data-status="CANCELLED">CANCELLED</button>
            </div>
          `;
          div.querySelectorAll("button[data-status]").forEach((btn) => {
            btn.addEventListener("click", async () => {
              const status = btn.getAttribute("data-status");
              const r = await fetch(`/api/orders/${o.id}/status`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status }),
              });
              debugEl.textContent = await r.text();
              await load();
            });
          });
          ordersEl.appendChild(div);
        }
      }

      document.getElementById("refresh").addEventListener("click", load);
      load();
    </script>
  </body>
</html>
