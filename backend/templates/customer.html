<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Coffee Shop - Customer</title>
    <link rel="stylesheet" href="/static/coffee.css" />
  </head>

  <body>
    <header>
      <h1>Coffee Shop</h1>
      <nav><a href="/kitchen">Kitchen Dashboard</a></nav>
    </header>

    <main class="container">
      <h2>Create Order</h2>
      <form id="orderForm" class="box">
        <label>
          Name
          <input name="customer_name" placeholder="Your name" required />
        </label>

        <label>
          Drink
          <select name="item_id" id="menuSelect"></select>
        </label>

        <label>
          Quantity
          <input name="qty" type="number" value="1" min="1" required />
        </label>

        <label>
          Note
          <input name="note" placeholder="No sugar / extra hot / etc." />
        </label>

        <button type="submit">Place order</button>
      </form>

      <h2>Result</h2>
      <pre id="result" class="box">No order submitted yet.</pre>
    </main>

    <script>
      const form = document.getElementById("orderForm");
      const menuSelect = document.getElementById("menuSelect");
      const result = document.getElementById("result");

      async function loadMenu() {
        const res = await fetch("/api/menu");
        const menu = await res.json();
        menuSelect.innerHTML = "";

        for (const item of menu) {
          const option = document.createElement("option");
          option.value = item.id;
          option.textContent = `${item.name} - $${item.price.toFixed(2)}`;
          menuSelect.appendChild(option);
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = Object.fromEntries(new FormData(e.target));
        data.item_id = Number(data.item_id);
        data.qty = Number(data.qty);

        const res = await fetch("/api/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        result.textContent = await res.text();
      });

      loadMenu();
    </script>
  </body>
</html>
